name: 毎日 Threads 自動投稿

on:
  schedule:
    # 毎日 11:00 UTC = 日本時間 20:00
    - cron: "0 11 * * *"
  workflow_dispatch:  # 手動実行ボタン

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # posts/ へのコミットに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install requests openai

      - name: ニュース収集 → 投稿文生成 → Threads 投稿
        env:
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
        run: python threads_security_post.py

      - name: 投稿文ファイルをコミット & プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "📝 Threads投稿文 $(date +%Y-%m-%d)"
          git push
